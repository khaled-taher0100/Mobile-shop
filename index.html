<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <title>Logic (JS-4)</title>
</head>
<body>


    <div class="parent">
        <div class="cont-sear">
            <input type="text" id="search" placeholder="search for products... ">
        </div>
        
        <ul class="list">
            <li>
                <div class="img img1"></div>
                <div class="name">Iphone X</div>
                <div class="price">Price : 7000</div>
                <button price="7000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img img2"></div>
                <div class="name">Iphone 11</div>
                <div class="price">Price : 15000</div>
                <button price="15000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img img3"></div>
                <div class="name">SM S22 ULTRA</div>
                <div class="price">Price : 50000</div>
                <button price="50000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img img4"></div>
                <div class="name">Oppo Reno 8 Pro</div>
                <div class="price">Price : 25000</div>
                <button price="25000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img img5"></div>
                <div class="name">Iphone 15 Pro Max</div>
                <div class="price">Price : 60000</div>
                <button price="60000" class="shop">Shop</button>
            </li>
            
            <p id="error">العنصر اللي بتدور عليه مش هنااااا يعمم</p>
        </ul>

        <div id="cart">
            <h3 style="font-size: 20px;">[ Selected Items ]</h3>
            <br>
        </div>


        <div id="contBtn">
            <button id="clear">Clear</button>
            <button id="showPrice">Show Price</button>
        </div>

        <div id="cartPrice"></div>
        
    </div>


    <script src="JS/Script.js"></script>
</body>
</html>
